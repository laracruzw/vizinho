<!-- Toda página do site vai ter navbar, o mesmo <head>, 
 o mesmo rodapé. Em vez de repetir isso em cada arquivo, 
 você escreve uma vez no base.html e as outras páginas herdam. -->

<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}Vizinho de Aluguel{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="/">Vizinho de Aluguel</a>
      <div>
        <a class="btn btn-outline-light btn-sm" href="#">Entrar</a>
        <a class="btn btn-light btn-sm" href="#">Cadastrar</a>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    {% block content %}{% endblock %} <!-- o que as pags filhas preenchem -->
  </main>

</body>
</html>

<!-- Toda página do site vai ter navbar, o mesmo <head>, 
 o mesmo rodapé. Em vez de repetir isso em cada arquivo, 
 você escreve uma vez no base.html e as outras páginas herdam. -->

<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}Vizinho de Aluguel{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="/">Vizinho de Aluguel</a>
      <div>
        {% if user.is_authenticated %}
          <span class="navbar-text text-light me-3">Olá, {{ user.username }}</span>
        {% if user.tipo == "CLIENTE" %}
          <a class="btn btn-success btn-sm" href="{% url 'criar_demanda' %}">Publicar demanda</a>
          <a class="btn btn-outline-light btn-sm" href="{% url 'minhas_demandas' %}">Minhas demandas</a>
        {% endif %}
        <form method="post" action="{% url 'logout' %}" class="d-inline">
            {% csrf_token %}
            <button type="submit" class="btn btn-outline-light btn-sm">Sair</button>
        </form>
        {% else %}
          <a class="btn btn-outline-light btn-sm" href="{% url 'login' %}">Entrar</a>
          <a class="btn btn-light btn-sm" href="{% url 'cadastro' %}">Cadastrar</a>
        {% endif %}
      </div>
    </div>
    
  </nav>
  <div class="container mt-3">
    {% for message in messages %}
      <div class="alert alert-success">{{ message }}</div>
    {% endfor %}
  </div>
  <main class="container py-4">
    {% block content %}{% endblock %} <!-- o que as pags filhas preenchem -->
  </main>

</body>
</html>

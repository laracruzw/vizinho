{% extends "core/base.html" %}

{% block title %}Enviar orçamento{% endblock %}

{% block content %}
  <h1 class="mb-4">Enviar orçamento</h1>
  <p class="text-muted">Demanda: <strong>{{ demanda.titulo }}</strong></p>

  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Enviar orçamento</button>
    <a href="{% url 'detalhe_demanda' demanda.pk %}" class="btn btn-secondary">Cancelar</a>
  </form>
{% endblock %}

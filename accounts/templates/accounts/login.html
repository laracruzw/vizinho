{% extends "core/base.html" %}

{% block title %}Entrar{% endblock %}

{% block content %}
  <h1 class="mb-4">Entrar</h1>

  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Entrar</button>
  </form>

  <p class="mt-3">Não tem conta? <a href="{% url 'cadastro' %}">Cadastre-se</a></p>
{% endblock %}
